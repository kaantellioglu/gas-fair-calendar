name: Deploy dashboard to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build/GAZ-FUAR_TAKVIMI-OTOMATIK.html'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p site
          cp build/GAZ-FUAR_TAKVIMI-OTOMATIK.html site/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
