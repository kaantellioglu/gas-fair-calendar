name: Update gas fair calendar

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * *'
    - cron: '47 3 * * 1'

concurrency:
  group: gas-fair-calendar-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          python -m playwright install --with-deps chromium

      - name: Run pipeline
        run: gas-fair-calendar update

      - name: Commit generated artifacts
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/*.json data/backups/*.json build/*
          git diff --cached --quiet || git commit -m 'chore: update gas fair calendar data'
          git push
